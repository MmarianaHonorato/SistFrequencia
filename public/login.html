<!DOCTYPE html>
<html lang="pt-br">
    <head>

        <meta charset="UTF-8">

        <title>Login</title>

        <link
            rel="stylesheet"
            href="css/login.css">

    </head>

    <body>

        <main class="login-card">

            <img
                src="images/logo.png"
                class="logo">

            <h1>
                Sistema de Frequência
            </h1>

            <p>
                Faça login para continuar
            </p>

            <form>

                <input
                    type="text"
                    placeholder="Usuário">

                <input
                    type="password"
                    placeholder="Senha">

                <button
                type="button"
                onclick="entrar()">

                Entrar

                </button>

            </form>

            <a href="cadastro.html">
                Criar conta
            </a>

        </main>
    <script src="js/login.js"></script>
    </body>
</html>
