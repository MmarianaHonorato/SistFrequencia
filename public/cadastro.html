<!DOCTYPE html>
<html lang="pt-br">
    <head>

        <meta charset="UTF-8">
        <title>Cadastro</title>
        <link
            rel="stylesheet"
            href="css/cadastro.css">

    </head>

    <body>

        <main class="cadastro-card">

            <img
                src="images/logo.png"
                class="logo">

            <h1>
                Cadastro
            </h1>

            <form>

                <input
                    placeholder="Nome">

                <input
                    placeholder="Email">

                <input
                    placeholder="Usuário">

                <input
                    type="password"
                    placeholder="Senha">

                <button>
                    Cadastrar
                </button>

            </form>

        </main>
        <script src="js/cadastro.js"></script>
    </body>
</html>
